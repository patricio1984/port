<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#111111"/>

  <!-- Chevron ">" — left-anchored, thick, violet -->
  <path
    d="M 5 6 L 18 16 L 5 26"
    stroke="#7c3aed"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- White glass highlight on inner apex — adds depth without decoration -->
  <path
    d="M 5 6 L 18 16 L 5 26"
    stroke="rgba(255,255,255,0.18)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Cursor blink dot — references terminal prompt "> _" -->
  <circle cx="25" cy="16" r="3.5" fill="#ffffff"/>

  <!-- Subtle violet inner glow on the dot -->
  <circle cx="25" cy="16" r="3.5" fill="#7c3aed" opacity="0.25"/>

</svg>
