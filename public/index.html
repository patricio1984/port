<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111111" />

    <!-- ── Canonical & robots ───────────────────────────────────────────── -->
    <link rel="canonical" href="https://patricio1984.github.io/port/" />
    <meta name="robots" content="index, follow" />

    <!-- ── Primary meta ─────────────────────────────────────────────────── -->
    <title>Patricio D. Mainero — Front End Developer</title>
    <meta
      name="description"
      content="Portfolio de Patricio D. Mainero, Front End Developer especializado en React, TypeScript y animaciones web de alto rendimiento. Buenos Aires, Argentina."
    />
    <meta name="author" content="Patricio D. Mainero" />

    <!-- ── Open Graph (LinkedIn, Facebook, Slack …) ─────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://patricio1984.github.io/port/" />
    <meta property="og:site_name"   content="Patricio D. Mainero" />
    <meta property="og:title"       content="Patricio D. Mainero — Front End Developer" />
    <meta property="og:description" content="React · TypeScript · CSS · Animaciones. Portfolio de Front End Developer con foco en rendimiento, accesibilidad y craft visual." />
    <meta property="og:image"       content="https://patricio1984.github.io/port/og-thumb.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="es_AR" />

    <!-- ── Twitter / X card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Patricio D. Mainero — Front End Developer" />
    <meta name="twitter:description" content="React · TypeScript · CSS · Animaciones. Portfolio de Front End Developer con foco en rendimiento, accesibilidad y craft visual." />
    <meta name="twitter:image"       content="https://patricio1984.github.io/port/og-thumb.png" />

    <!-- ── Favicons & manifest ───────────────────────────────────────────── -->
    <!-- SVG favicon: vector-sharp at any size, supports dark/light via @media -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="manifest"         href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Font preconnect (eliminates round-trip latency) ──────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- ── Google Fonts: Fraunces (variable display) + Inter (body) ─────── -->
    <!--
      Fraunces axes: wght 100-900, opsz 9-144, SOFT 0-100, WONK 0-1
      Inter       : wght 100-900, wdth 75-125
      display=swap ensures text is visible during load (FOUT instead of FOIT).
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>Necesitás JavaScript habilitado para ver este portfolio.</noscript>
    <div id="root"></div>
  </body>
</html>
